<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <style>
      body {
        font-size: 40px;
      }
      .delay1 {
        --animate-duration: 800ms;
        --animate-delay: 0.9s;
      }
      .delay2 {
        --animate-duration: 1200ms;
        --animate-delay: 1.9s;
      }
    </style>
  </head>
  <body>
    <h1 class="animate__animated animate__bounceInDown">This is my page</h1>

    <p class="animate__animated animate__bounceInDown delay1">
      Lorem ipsum, dolor sit amet consectetur adipisicing elit. Omnis nostrum
      repellat voluptas ratione incidunt facere porro necessitatibus sapiente
      tenetur. Aut?
    </p>

    <h2 class="animate__animated animate__bounceInDown delay2">this is fun</h2>
  </body>
</html>
