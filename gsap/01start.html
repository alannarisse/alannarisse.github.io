<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSAP</title>
    <link rel="stylesheet" href="https://codepen.io/GreenSock/pen/qEWKyrL.css">
    <style>
        /* Global styles come from external css https://codepen.io/GreenSock/pen/qEWKyrL.css */

        body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 2rem;
        overflow: hidden;
        }

        .box {
            margin-left:-600px;
        display: block;
        width:100px;
        height:100px;
        }

        .green{
            color: var(--dark);
    background: var(--gradient-macha), url(https://assets.codepen.io/16327/noise-e82662fe.png);
    background-blend-mode: color-dodge;
        }
    </style>
</head>
<body>
    <div class="box green"></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
        // animate to some values
gsap.to(".box", { 
  x: 600,
  rotation: 360,
  scale: 1.2,
  duration: 1,
  repeat: 4, // with a repeat
  yoyo: true, 
  delay: .5,
  ease: "back.inOut"
});

// or from some values
// gsap.from(".box", { 
//   x: -200,
//   rotation: -360,
//   scale: 0,
//   duration: 1,
//   ease: "back.out"
// });

// or choose both the start and end values and animate between them
// gsap.fromTo(".box", {
//   x: -200,
//   rotation: -360,
//   scale: 0,
// },{ 
//   x: 200,
//   rotation: 360,
//   scale: 1.2,
//   duration: 1,
//   ease: "back.out"
// });

    </script>
</body>
</html>
