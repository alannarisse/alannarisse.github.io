<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <style>
        body {
            margin:0;
        }
        section {
            padding:100px 40px;
            height:100vh;
            width:100vw;
            background:rgb(200, 211, 211);
        }
        #one {}
        #two {
            background:rgb(211, 206, 200);
        }
        #three {
            background:rgb(208, 200, 211);
        }
        section>div {
            width:200px;
            height:200px;
            background:rgb(231, 171, 108);
        }
        .box1 {
            
        }
        .box2 {
            background:rgb(108, 231, 133);
            margin-top:400px;
        }
    </style>
</head>
<section id="one"></section>
<section id="two">
    <div class="box1"></div>
    <div class="box2"></div>
</section>
<section id="three"></section>


<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/ScrollTrigger.min.js"></script>


<script>
gsap.to('.box1',{
    x:700,
    scrollTrigger: '#two',
    reversed: true
})

gsap.to('.box2',{
    x:300,
    rotate: 480,
    duration: 6,
    scrollTrigger: '#three',
    reversed: true

})
</script>
</body>
</html>
