<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="reset.css" />
    <style>
      .wrapper {
        position: relative;
      }
      .bg-img {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -9;
      }
      section {
        height: 100vh;
        width: 100vw;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      p {
        font-size: 60px;
        font-family: Verdana, Geneva, Tahoma, sans-serif;
      }

      #horiz1 {
        width: 300vw;
        display: flex;
      }
      #horiz2 {
        width: 200vw;
        display: flex;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <img class="bg-img" src="images/IMG_2490.jpeg" />
      <main id="horiz1">
        <section id="one">
          <p>I'm a section one</p>
        </section>
        <section id="two">
          <p>I'm a section two</p>
        </section>
        <section id="three">
          <p>I'm a section three</p>
        </section>
      </main>

      <section id="four">
        <p>I'm a section four</p>
      </section>

      <section id="five">
        <p>I'm a section five</p>
      </section>
      <main id="horiz2">
        <section id="six">
          <p>I'm a section six</p>
        </section>
        <section id="six">
          <p>I'm the other section six</p>
        </section>
      </main>
      <section id="seven">
        <p>I'm a section seven</p>
      </section>
      <section id="eight">
        <p>I'm a section seven</p>
      </section>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/ScrollTrigger.min.js"></script>
    <script>
      // use a script tag or an external JS file
      document.addEventListener('DOMContentLoaded', event => {
        gsap.registerPlugin(ScrollTrigger);
        // gsap code here!

        // Here's the code for the horizontal scroll
        // gets the horiz-container1 class
        const horiz1 = document.querySelector('#horiz1');
        const horiz2 = document.querySelector('#horiz2');
        //counts how many sections there are inside the horiz-container1 class
        const sections1 = gsap.utils.toArray('#horiz1 section');
        const sections2 = gsap.utils.toArray('#horiz2 section');

        let scrollTween1 = gsap.to(sections1, {
          xPercent: -100 * (sections1.length - 1),
          ease: 'none',
          scrollTrigger: {
            trigger: '#horiz1',
            pin: true,
            scrub: 1,
            end: '+=3000',
            markers: true,
          },
        });

        let scrollTween2 = gsap.to(sections2, {
          xPercent: -100 * (sections2.length - 1),
          ease: 'none',
          scrollTrigger: {
            trigger: '#horiz2',
            pin: true,
            scrub: 1,
            end: '+=3000',
            markers: true,
          },
        });

        //closing gsap wrapper
      });
    </script>
  </body>
</html>
