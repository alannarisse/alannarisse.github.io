<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    body {
      background: blue;
      color: white;
    }

    a {
      color: white;
    }

    .both,
    .max1280 {
      display: none;
    }

    .nomedia {
      display: block;
    }

    @media (max-width:1280px) {
      body {
        background: red;
      }

      .max1280 {
        display: block;
      }
    }

    @media (pointer:coarse),
    (hover:none) {
      body {
        background: fuchsia;
      }

      .both {
        display: block;
      }
    }
  </style>
</head>

<body>
  <h1>Hi everybody</h1>
  <ul>
    <li class="both">fucshia is @media hover:none and pointer:coarse, comma separated</li>
    <li class="max1280">red is @media max width 1280</li>
    <li class="nomedia">blue is no media query</li>
  </ul>
  <p><a href="mobile-coarse.html">try coarse only</a></p>
  <p><a href="mobile.html">back</a></p>
</body>

</html>
