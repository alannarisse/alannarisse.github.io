<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .collage {
        position: relative;
        width: 100vw;
        min-height: 100vh;
      }
      .collage img {
        position: absolute;
        width: 400px;
      }
      .blob1 {
        top: 50px;
        left: 5%;
      }
      .blob2 {
        top: 160px;
        left: 32%;
      }
      .crissy {
        top: 50px;
        left: 70%;
      }
      .kati {
        top: 600px;
        left: 10%;
      }
      .tara {
        top: 500px;
        left: 60%;
      }
    </style>
  </head>
  <body>
    <section class="collage">
      <img class="blob1" src="images/blob1.png" />
      <img class="blob2" src="images/blob2.png" />
      <img class="crissy" src="images/crissy-jarvis-gdL-UZfnD3I-unsplash.jpg" />
      <img
        class="kati"
        src="images/kati-hoehl-i3rBo3b9QbA-unsplash.jpg"
        alt=""
      />
      <img class="tara" src="images/pexels-tara-winstead-8850706.jpg" />
    </section>
  </body>
</html>
