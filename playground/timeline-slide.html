<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <style>
    * {
      box-sizing: border-box;
    }

    .parent {
      display: grid;
      grid-template-columns: 50% 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 8px;
    }

    .div2,
    .div3 {
      border: 1px solid black;
    }

    .div1 {
      grid-row: 1/3;
      border: 1px solid black;
    }

    .div4 {
      grid-column: span 2 / span 2;
      grid-column-start: 2;
      padding: 20px;
      border: 1px solid black;

    }

    .clickable {
      width: 600px;
      position: relative;
      margin-top: 30px;
    }

    .circle {
      position: absolute;
      top: -28px;
      background: red;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      transition: 2s;
    }

    .one {
      left: 0;
    }

    .two {
      left: 290px;
    }

    .three {
      left: 580px;
    }

    hr {
      border: 4px solid black;
      width: 600px;
      margin: 0;
    }



    .hide {
      display: none;
    }
  </style>
</head>

<body>
  <div class="parent">
    <div class="div1">1</div>
    <div class="div2">2</div>
    <div class="div3">3</div>
    <div class="div4">
      <div class="clickable">
        <div class="circle one"></div>
        <div class="circle two hide"></div>
        <div class="circle three hide"></div>
      </div>
      <hr />
      Slider
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-4.0.0.min.js"
    integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
  <script>
    $('.one').click(function () {
      $('.one').css('transform', 'translateX(290px)')
      setTimeout(() => {
        $('.one').addClass('hide');
        $('.two').removeClass('hide');
      }, 2000);
    });
    $('.two').click(function () {
      $('.two').css('transform', 'translateX(290px)')
      setTimeout(() => {
        $('.two').addClass('hide');
        $('.three').removeClass('hide');
      }, 2000);
    });
  </script>
</body>

</html>
